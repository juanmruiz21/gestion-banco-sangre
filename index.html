<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Hemoterapia | Hospital Balestrini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #0099cc; --accent: #e11d48; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--dark); margin: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Encabezado con Logo */
        header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px; border-top: 8px solid var(--primary); }
        .logo { max-width: 280px; height: auto; margin-bottom: 15px; }
        h1 { margin: 10px 0; color: var(--dark); font-size: 1.8rem; }

        /* Calculador */
        .calculator-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .grid-calc { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-calc { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-calc:hover { background: #0077a3; }
        #resultado-calc { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }

        /* Buscador */
        .search-section { margin-top: 40px; }
        .search-box { width: 100%; padding: 18px; font-size: 1.1rem; border: 2px solid var(--primary); border-radius: 50px; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(0,153,204,0.1); outline: none; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #94a3b8; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .card:hover { transform: translateX(5px); }
        .card.permanente { border-left-color: #ef4444; background: #fff5f5; }
        .card.transitorio { border-left-color: #f59e0b; background: #fffbeb; }
        .card.nodifiere { border-left-color: #10b981; background: #f0fdf4; }
        .code { background: #eee; padding: 3px 8px; border-radius: 4px; font-family: monospace; font-weight: bold; font-size: 0.8rem; }
        .tiempo-badge { background: var(--dark); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }

        @media (max-width: 600px) { .grid-calc { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo-balestrini.jpg" alt="Hospital Balestrini" class="logo">
        <h1>Sistema de Consulta y Gestión</h1>
        <p style="color: #64748b;">Normativa Técnica PBA - Actualización Agosto 2025</p>
    </header>

    <div class="calculator-card">
        <h3 style="margin-top:0; color: var(--primary);"><i class="fa-solid fa-calendar-check"></i> Calculador de Próxima Donación</h3>
        <div class="grid-calc">
            <div>
                <label>Última donación:</label>
                <input type="date" id="fechaUltima">
            </div>
            <div>
                <label>Género / Edad:</label>
                <select id="tipoDonante">
                    <option value="8">Masculino (8 semanas)</option>
                    <option value="12">Femenino (12 semanas)</option>
                    <option value="26">Menor 16-18 años (6 meses)</option>
                </select>
            </div>
            <button class="btn-calc" onclick="calcularFecha()">CALCULAR FECHA</button>
        </div>
        <div id="resultado-calc"></div>
    </div>

    <div class="search-section">
        <h3 style="color: var(--dark);"><i class="fa-solid fa-magnifying-glass"></i> Buscador de Criterios de Diferimiento</h3>
        <input type="text" id="searchInput" class="search-box" placeholder="Buscar medicación, vacuna, cirugía o condición...">
        <div id="results"></div>
    </div>

    <p style="text-align: center; font-size: 0.8rem; color: #94a3b8; margin-top: 40px;">
        Referencia Normativa: [cite: 4] <br>
        Hospital Zonal General Dr. Alberto Balestrini - Servicio de Hemoterapia
    </p>
</div>

<script>
    // Función Calculadora basada en normativa (Página 3 del PDF)
    function calcularFecha() {
        const fechaIn = document.getElementById('fechaUltima').value;
        const semanas = parseInt(document.getElementById('tipoDonante').value);
        const resDiv = document.getElementById('resultado-calc');

        if(!fechaIn) {
            alert("Por favor, seleccioná una fecha.");
            return;
        }

        let fecha = new Date(fechaIn);
        // Ajustamos por semanas (7 días por semana) 
        fecha.setDate(fecha.getDate() + (semanas * 7));

        const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        resDiv.style.display = 'block';
        resDiv.style.background = '#e0f2fe';
        resDiv.style.color = '#0369a1';
        resDiv.innerHTML = `<i class="fa-solid fa-calendar-day"></i> Apto para próxima donación el:<br><span style="font-size:1.2rem">${fecha.toLocaleDateString('es-AR', opciones)}</span>`;
    }

    // Base de datos inteligente con códigos oficiales del PDF
    const criterios = [
        { c: "DR7", d: "Tatuajes, Maquillaje permanente, Acupuntura", t: "1 año", cat: "transitorio" }, // [cite: 125]
        { c: "DR8", d: "Piercing / Tatuaje material propio", t: "6 meses", cat: "transitorio" }, // [cite: 125]
        { c: "IN21", d: "Dengue (luego del alta)", t: "1 mes", cat: "transitorio" }, // [cite: 130]
        { c: "MD1", d: "Insulina, Digoxina, Antipsicóticos, Anticoagulantes", t: "Permanente", cat: "permanente" }, // [cite: 96, 135]
        { c: "VC2", d: "Vacunas: Sabin (Polio oral), Triple Viral, Varicela", t: "1 mes", cat: "transitorio" }, // [cite: 108, 109, 112]
        { c: "MD", d: "Anticonceptivos, Analgésicos menores, Vitaminas", t: "Sin diferimiento", cat: "nodifiere" }, // [cite: 106]
        { c: "GO4", d: "Parto o Cesárea (sin transfusiones)", t: "6 meses", cat: "transitorio" }, // [cite: 80, 127]
        { c: "QX11", d: "Cirugía menor sin transfusiones (con alta)", t: "6 meses", cat: "transitorio" }, // [cite: 132]
        { c: "QX14", d: "Extracción dental simple (sin antibióticos)", t: "3 días", cat: "transitorio" }, // [cite: 133]
        { c: "IN1", d: "Consumo de drogas IV (Toxicomanía)", t: "Permanente", cat: "permanente" }, // [cite: 128]
        { c: "HE7", d: "Hemoglobina baja (Anemia < 12,5 g/dl)", t: "6 meses / Derivar", cat: "transitorio" } // [cite: 71, 127]
    ];

    const searchInput = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('results');

    function filtrar() {
        const busqueda = searchInput.value.toLowerCase();
        resultsDiv.innerHTML = '';
        
        const fitro = criterios.filter(i => i.d.toLowerCase().includes(busqueda) || i.c.toLowerCase().includes(busqueda));

        fitro.forEach(i => {
            const div = document.createElement('div');
            div.className = `card ${i.cat}`;
            div.innerHTML = `
                <div>
                    <span class="code">${i.c}</span><br>
                    <strong>${i.d}</strong>
                </div>
                <div class="tiempo-badge">${i.t}</div>
            `;
            resultsDiv.appendChild(div);
        });
    }

    searchInput.addEventListener('input', filtrar);
    filtrar();
</script>

</body>
</html>
