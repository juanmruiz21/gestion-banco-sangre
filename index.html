<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemoterapia | Hospital Balestrini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #0099cc; --accent: #e11d48; --bg: #f4f7f9; --dark: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 0; }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; border-bottom: 5px solid var(--primary); }
        .logo { max-width: 220px; height: auto; }
        .card-main { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .search-box { width: 100%; padding: 15px 15px 15px 45px; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; outline: none; }
        .search-container { position: relative; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #fff; border-radius: 10px; margin-bottom: 8px; border: 1px solid #edf2f7; border-left: 5px solid #cbd5e1; font-size: 0.9rem; }
        .item-card.permanente { border-left-color: #ef4444; background: #fff5f5; }
        .item-card.transitorio { border-left-color: #f59e0b; background: #fffbeb; }
        .item-card.nodifiere { border-left-color: #10b981; background: #f0fdf4; }
        .time-badge { background: var(--dark); color: white; padding: 3px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; white-space: nowrap; margin-left: 10px; }
        .code-label { font-family: monospace; font-weight: bold; color: #64748b; font-size: 0.7rem; display: block; }
        .grid-calc { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
        .btn-calc { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; height: 45px; }
        #resultado-calc { margin-top: 15px; padding: 12px; border-radius: 10px; display: none; text-align: center; font-size: 0.9rem; }
        @media (max-width: 600px) { .grid-calc { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo-balestrini.jpg" alt="Logo Hospital" class="logo">
        <h1 style="font-size: 1.3rem; margin: 10px 0 0;">SERVICIO DE HEMOTERAPIA</h1>
        <p style="font-size: 0.8rem; color: #64748b; margin: 5px 0;">Calculador y Buscador Técnico (Normativa PBA 2025)</p>
    </header>

    <div class="card-main">
        <h2><i class="fa-solid fa-calendar-day"></i> Frecuencia de Donación</h2>
        <div class="grid-calc">
            <div><label style="font-size: 0.75rem;">Última donación:</label><input type="date" id="fechaUltima"></div>
            <div><label style="font-size: 0.75rem;">Donante:</label>
                <select id="tipoDonante">
                    <option value="8">Masculino (8 semanas)</option>
                    <option value="12">Femenino (12 semanas)</option>
                    <option value="26">Menor 16-18 años (6 meses)</option>
                </select>
            </div>
            <button class="btn-calc" onclick="calcular()">CALCULAR</button>
        </div>
        <div id="resultado-calc"></div>
    </div>

    <div class="card-main">
        <h2><i class="fa-solid fa-magnifying-glass"></i> Buscador de Diferimientos</h2>
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-box" placeholder="Ej: Psoriasis, Endoscopía, Aspirina, Tatuaje...">
        </div>
        <div id="results" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    function calcular() {
        const f = document.getElementById('fechaUltima').value;
        const s = document.getElementById('tipoDonante').value;
        const r = document.getElementById('resultado-calc');
        if(!f) return;
        let d = new Date(f);
        d.setDate(d.getDate() + (s * 7));
        r.style.display = 'block';
        r.style.background = '#e0f2fe';
        r.innerHTML = `Próxima fecha apta: <strong>${d.toLocaleDateString('es-AR', {dateStyle:'full'})}</strong>`;
    }

    // BASE DE DATOS TÉCNICA COMPLETA (Extraída de NO-2025-30567861)
    const db = [
        // MEDICAMENTOS Y PATOLOGÍAS (MD e IN)
        { c: "MD1", d: "Psoriasis (si usa metotrexato, acitretina o biológicos)", t: "Permanente", cat: "permanente" },
        { c: "MD1", d: "Insulina / Digoxina / Anticoagulantes / Antipsicóticos / Quimioterapia", t: "Permanente", cat: "permanente" },
        { c: "MD4", d: "Dutasteride (Avodart)", t: "6 Meses", cat: "transitorio" },
        { c: "MD3", d: "Finasteride (Propecia)", t: "1 Mes", cat: "transitorio" },
        { c: "MD6", d: "Antibióticos (luego de finalizar el tratamiento)", t: "7 Días", cat: "transitorio" },
        { c: "MD", d: "Aspirina / Analgésicos menores / Anticonceptivos / Vitaminas", t: "Sin Diferimiento", cat: "nodifiere" },
        { c: "MD", d: "Corticoides vía oral (terminado el tratamiento)", t: "Sin Diferimiento", cat: "nodifiere" },
        
        // INFECTOLOGÍA (IN)
        { c: "IN21", d: "Dengue (Días posteriores al alta médica)", t: "1 Mes", cat: "transitorio" },
        { c: "IN3", d: "Chagas / Sífilis / VIH / Hepatitis B / Hepatitis C / HTLV", t: "Permanente", cat: "permanente" },
        { c: "IN4", d: "Brucelosis (luego del alta)", t: "2 Años", cat: "transitorio" },
        { c: "IN11", d: "Mononucleosis (luego del alta)", t: "6 Meses", cat: "transitorio" },
        
        // CIRUGÍAS Y PROCEDIMIENTOS (QX y DR)
        { c: "DR7", d: "Tatuajes / Maquillaje Permanente / Acupuntura", t: "1 Año", cat: "transitorio" },
        { c: "DR8", d: "Piercing / Tatuaje realizado con material propio", t: "6 Meses", cat: "transitorio" },
        { c: "QX10", d: "Endoscopía / Colonoscopía / Laparoscopía", t: "6 Meses", cat: "transitorio" },
        { c: "QX11", d: "Cirugía Menor sin transfusiones (con alta médica)", t: "6 Meses", cat: "transitorio" },
        { c: "QX14", d: "Extracción Dental Simple (sin infección)", t: "3 Días", cat: "transitorio" },
        { c: "QX13", d: "Cirugía Odontológica con ATB (luego de suspender)", t: "15 Días", cat: "transitorio" },
        
        // VACUNAS (VC)
        { c: "VC", d: "Vacuna Antigripal / Salk / Hepatitis A/B / HPV / Tétanos / Difteria", t: "Sin Diferimiento", cat: "nodifiere" },
        { c: "VC2", d: "Vacuna Sabin oral / Triple Viral / Sarampión / Rubéola / Varicela", t: "1 Mes", cat: "transitorio" },
        
        // OTROS (OT)
        { c: "OT4", d: "Fracturas sin tratamiento quirúrgico", t: "1 Mes", cat: "transitorio" },
        { c: "OT6", d: "Yeso (luego de retirado)", t: "15 Días", cat: "transitorio" },
        { c: "HE7", d: "Hemoglobina baja (Anemia < 12,5 g/dl)", t: "6 Meses / Derivar", cat: "transitorio" },
        { c: "GO4", d: "Embarazo / Parto / Cesárea / Aborto (sin transfusiones)", t: "6 Meses", cat: "transitorio" }
    ];

    const input = document.getElementById('searchInput');
    const res = document.getElementById('results');

    function buscar() {
        const v = input.value.toLowerCase().trim();
        res.innerHTML = '';
        if(!v) return;
        const filtrados = db.filter(i => i.d.toLowerCase().includes(v) || i.c.toLowerCase().includes(v));
        
        filtrados.forEach(i => {
            const div = document.createElement('div');
            div.className = `item-card ${i.cat}`;
            div.innerHTML = `<div><span class="code-label">${i.c}</span><strong>${i.d}</strong></div><div class="time-badge">${i.t}</div>`;
            res.appendChild(div);
        });
    }
    input.addEventListener('input', buscar);
</script>
</body>
</html>
