<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemoterapia | Hospital Balestrini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #0099cc; --accent: #e11d48; --bg: #f4f7f9; --dark: #1e293b; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        header { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; border-bottom: 5px solid var(--primary); }
        .logo { max-width: 180px; height: auto; }
        .card-main { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        .search-container { position: relative; margin-bottom: 15px; }
        .search-box { width: 100%; padding: 15px 15px 15px 45px; font-size: 1.1rem; border: 2px solid var(--primary); border-radius: 15px; box-sizing: border-box; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .item-card { padding: 15px; background: #fff; border-radius: 12px; margin-bottom: 12px; border: 1px solid #edf2f7; border-left: 8px solid #cbd5e1; }
        .item-card.permanente { border-left-color: var(--accent); }
        .item-card.transitorio { border-left-color: var(--warning); }
        .item-card.nodifiere { border-left-color: var(--success); }
        .header-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .code-label { font-family: monospace; font-weight: bold; color: #64748b; font-size: 0.8rem; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
        .time-badge { background: var(--dark); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; }
        .title-item { font-size: 1.05rem; font-weight: 700; color: #1e293b; display: block; margin-bottom: 5px; }
        .info-detallada { font-size: 0.9rem; line-height: 1.4; color: #475569; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; white-space: pre-line; }
        .grid-calc { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
        .btn-calc { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; height: 45px; }
        #resultado-calc { margin-top: 15px; padding: 12px; border-radius: 10px; display: none; text-align: center; font-size: 0.95rem; border: 1px solid #bae6fd; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo-balestrini.jpg" alt="Logo Balestrini" class="logo">
        <h1 style="font-size: 1.2rem; margin: 10px 0 0;">HEMOTERAPIA OPERATIVA (PBA)</h1>
        <p style="font-size: 0.8rem; color: #64748b; margin: 4px 0;">Referencia: NO-2025-30567861-GDEBA</p>
    </header>

    <div class="card-main">
        <h2><i class="fa-solid fa-magnifying-glass"></i> Buscador Técnico</h2>
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-box" placeholder="Ej: Hemoglobina, TBC, CV2, OT1, Psoriasis...">
        </div>
        <div id="resultsList"></div>
    </div>

    <div class="card-main">
        <h2><i class="fa-solid fa-calendar-check"></i> Próxima Donación</h2>
        <div class="grid-calc">
            <div><label style="font-size: 0.75rem;">Última donación:</label><input type="date" id="fechaUltima" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc;"></div>
            <div><label style="font-size: 0.75rem;">Criterio:</label>
                <select id="tipoDonante" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc;">
                    <option value="8">Masculino (8 semanas)</option>
                    <option value="12">Femenino (12 semanas)</option>
                    <option value="26">Menor 16-18 años (6 meses)</option>
                </select>
            </div>
            <button class="btn-calc" onclick="calcular()">CALCULAR</button>
        </div>
        <div id="resultado-calc"></div>
    </div>

    <footer>Hospital Balestrini - Servicio de Hemoterapia</footer>
</div>

<script>
    function calcular() {
        const f = document.getElementById('fechaUltima').value;
        const s = document.getElementById('tipoDonante').value;
        const r = document.getElementById('resultado-calc');
        if(!f) return;
        let d = new Date(f);
        d.setDate(d.getDate() + (s * 7));
        r.style.display = 'block';
        r.style.background = '#f0f9ff';
        r.innerHTML = `Próxima fecha apta: <strong>${d.toLocaleDateString('es-AR', {dateStyle:'full'})}</strong>`;
    }

    const db = [
        // PARÁMETROS CLÍNICOS
        { c: "RANGO", d: "Hemoglobina / Hematocrito", t: "12,5-17 gr/dl / 38-52%", i: "Mínimo 12,5 gr/dl de Hemoglobina y 38% de Hematocrito.\nHE7: Si es menor, diferir 6 meses y derivar para estudio.", cat: "nodifiere" },
        { c: "RANGO", d: "Tensión Arterial", t: "100-170 / 60-100 mmHg", i: "Sistólica: 100-170. Diastólica: 60-100. Valores fuera de rango requieren evaluación médica.", cat: "nodifiere" },
        
        // INFECTOLOGÍA (IN)
        { c: "IN7", d: "Tuberculosis (TBC)", t: "2 Años", i: "Diferimiento de 2 años después de la curación definitiva.", cat: "transitorio" },
        { c: "IN21", d: "Dengue", t: "1 Mes", i: "1 mes desde el alta médica. Si fue Dengue Hemorrágico (IN15): 4 meses.", cat: "transitorio" },
        { c: "IN3", d: "VIH / Hepatitis B-C / Sífilis / Chagas", t: "Permanente", i: "Infecciones confirmadas o antecedentes positivos.", cat: "permanente" },

        // CARDIOLOGÍA (CV)
        { c: "CV1", d: "Infarto / Coronariopatías", t: "Permanente", i: "Diferimiento por seguridad del donante.", cat: "permanente" },
        { c: "CV9", d: "Cateterismo / Angioplastia", t: "6 Meses", i: "Diferimiento por procedimiento invasivo.", cat: "transitorio" },

        // DERMATOLOGÍA (DR)
        { c: "DR11", d: "Psoriasis", t: "6 Meses / Permanente", i: "6 meses tras brote leve. Permanente (MD1) si usa medicación biológica.", cat: "transitorio" },
        { c: "DR7", d: "Tatuajes / Piercings / Acupuntura", t: "1 Año / 6 Meses", i: "12 meses estándar. 6 meses si el centro usa técnica NAT.", cat: "transitorio" },

        // MEDICAMENTOS (MD)
        { c: "MD1", d: "Medicación Crónica (Insulina, Digoxina, Anticoagulantes)", t: "Permanente", i: "Ver anexo para drogas específicas de quimioterapia o psiquiatría.", cat: "permanente" },
        { c: "MD3", d: "Finasteride (Propecia)", t: "1 Mes", i: "Diferimiento por potencial teratogénico.", cat: "transitorio" },
        { c: "MD4", d: "Dutasteride (Avodart)", t: "6 Meses", i: "Diferimiento por vida media de la droga.", cat: "transitorio" },

        // TABLA OTROS (OT)
        { c: "OT2", d: "Accidente Punzocortante", t: "1 Año", i: "Pinchazo accidental con material de riesgo.", cat: "transitorio" },
        { c: "OT6", d: "Yeso (Inmovilización)", t: "15 Días", i: "A partir de la fecha en que se retira el yeso.", cat: "transitorio" },
        { c: "OT11", d: "Escaso Volumen / Aguja Tapada", t: "1 Día", i: "Puede reintentar al día siguiente si su Hb lo permite.", cat: "transitorio" }
    ];

    const input = document.getElementById('searchInput');
    const container = document.getElementById('resultsList');

    function buscar() {
        const b = input.value.toLowerCase().trim();
        container.innerHTML = '';
        if(!b) return;
        const f = db.filter(i => i.d.toLowerCase().includes(b) || i.c.toLowerCase().includes(b) || i.i.toLowerCase().includes(b));
        f.forEach(i => {
            const card = document.createElement('div');
            card.className = `item-card ${i.cat}`;
            card.innerHTML = `<div class="header-item"><span class="code-label">${i.c}</span><span class="time-badge">${i.t}</span></div><span class="title-item">${i.d}</span><div class="info-detallada">${i.i}</div>`;
            container.appendChild(card);
        });
    }
    input.addEventListener('input', buscar);
</script>
</body>
</html>
